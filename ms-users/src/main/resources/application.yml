server:
  port: 8083

spring:
  application:
    name: users

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3308/db_users?createDatabaseIfNotExist=true}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root_password}

  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations:
        - classpath:db/schema.sql

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:relatos_secret_password}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.data.jpa: DEBUG

security:
  jwt:
    private-key-path: classpath:keys/private.pem
    public-key-path: classpath:keys/public.pem
    ttl-seconds: ${JWT_TTL_SECONDS:300}


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: false
    # 🚨 SOLUCIÓN AQUÍ: Forzamos un ID limpio basado en el nombre y puerto (Elimina la IP de Eureka)
    instanceId: ${spring.application.name}:${server.port}:${random.value}
    # Declaramos el nombre lógico del host dentro de la red del clúster
    #hostname: ${spring.application.name}
    hostname: localhost

